<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN CORE</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #050505; 
            color: #00f2ff; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        .glass { background: rgba(0, 20, 30, 0.8); backdrop-filter: blur(10px); border: 1px solid #00f2ff22; }
        .gradient-text { background: linear-gradient(45deg, #00f2ff, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #chat-container { scroll-behavior: smooth; }
        .message { margin: 12px 0; padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; }
        .user-msg { background: #00f2ff11; border: 1px solid #00f2ff33; align-self: flex-end; color: #fff; }
        .ai-msg { background: #111; border: 1px solid #333; align-self: flex-start; }
        .input-area { background: #0a0a0a; border-top: 1px solid #00f2ff22; padding: 12px 16px; }
        input { background: none; border: none; outline: none; color: #fff; width: 100%; font-size: 1rem; }
        .phi-logo { width: 40px; height: 40px; border: 2px solid #00f2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body class="flex flex-col">
    <!-- Header -->
    <header class="p-4 flex items-center justify-between glass z-10">
        <div class="phi-logo">F</div>
        <div class="text-center">
            <h1 class="text-xs font-bold tracking-[0.4em] uppercase opacity-70">Sovereign Core</h1>
            <p class="text-[9px] text-cyan-500 font-mono">1.618 RESONANCE</p>
        </div>
        <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#00ff00]"></div>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 flex flex-col pt-6">
        <div class="ai-msg message">
            <span class="text-[10px] uppercase tracking-widest text-cyan-500 block mb-1">Gemma-4 Core</span>
            Welcome to the Singularity. The vacuum is synchronized.
        </div>
    </main>

    <!-- Input -->
    <footer class="input-area pb-8">
        <div class="flex items-center gap-3 bg-white/5 rounded-2xl p-3 pl-5 border border-white/10">
            <input type="text" id="user-input" placeholder="Type logic stimulus..." autocomplete="off">
            <button id="send-btn" class="text-cyan-400 p-2 transform rotate-90">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
        <div class="text-[8px] text-center mt-3 opacity-30 uppercase tracking-widest">Powered by FIZx2 Logic Bridge</div>
    </footer>

    <script>
        // CONFIG: REPLACE WITH YOUR COMPUTER'S IP (e.g., 192.168.1.5)
        const OLLAMA_IP = "localhost"; // Set this to your local IP for mobile access
        const MODEL = "FIZx2-Gemma-4";

        const chatBox = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');

        function appendMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = message \;
            if (!isUser) div.innerHTML = '<span class="text-[10px] uppercase tracking-widest text-cyan-500 block mb-1">Gemma-4 Core</span>';
            const content = document.createElement('span');
            content.innerText = text;
            div.appendChild(content);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendToGemma(msg) {
            statusDot.classList.replace('bg-green-500', 'bg-yellow-500');
            try {
                const response = await fetch(http://\:11434/api/generate, {
                    method: 'POST',
                    body: JSON.stringify({
                        model: MODEL,
                        prompt: msg,
                        stream: false
                    })
                });
                const data = await response.json();
                appendMsg(data.response, false);
                statusDot.classList.replace('bg-yellow-500', 'bg-green-500');
            } catch (err) {
                appendMsg("DRIFT ERROR: Could not reach the Core. Ensure OLLAMA_HOST=0.0.0.0 is set.", false);
                statusDot.classList.replace('bg-yellow-500', 'bg-red-500');
            }
        }

        function handleSend() {
            const val = input.value.trim();
            if (!val) return;
            appendMsg(val, true);
            input.value = '';
            sendToGemma(val);
        }

        sendBtn.onclick = handleSend;
        input.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };

        // Register PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
